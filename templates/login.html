<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Outfit", sans-serif;
    background: #0a0a0f;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: "";
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    background: #13131a;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    position: relative;
    z-index: 1;
  }
  .logo { width: 64px; height: 64px; margin: 0 auto 16px; filter: drop-shadow(0 0 16px rgba(245,197,24,0.35)); }
  .title { font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
  .title span { background: linear-gradient(135deg, #2563eb, #00d4aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }

  /* Tabs */
  .tabs { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 3px; margin-bottom: 24px; }
  .tab { flex: 1; padding: 8px; font-family: "Outfit", sans-serif; font-size: 13px; font-weight: 600;
          background: none; border: none; color: #64748b; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: #1e293b; color: #f1f5f9; }

  /* Formulario */
  .form-panel { display: none; }
  .form-panel.active { display: block; }
  .field { margin-bottom: 14px; text-align: left; }
  .field label { display: block; font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 500; }
  .field input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #f1f5f9;
    font-family: "Outfit", sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: #2563eb; }
  .field input::placeholder { color: #334155; }

  .btn-primary {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white; border: none; border-radius: 10px;
    font-family: "Outfit", sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: #334155; font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 12px;
    background: #ffffff; color: #1f2937;
    border: none; border-radius: 10px;
    font-family: "Outfit", sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; text-decoration: none; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .google-btn:hover { background: #f1f5f9; transform: translateY(-1px); }
  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

  .error-msg { color: #ef4444; font-size: 12px; margin-top: 10px; min-height: 18px; }
  .disclaimer { margin-top: 20px; font-size: 11px; color: #334155; line-height: 1.6; }
</style>
</head>

<script>
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
  });
  document.getElementById("panel-login").classList.toggle("active", tab === "login");
  document.getElementById("panel-register").classList.toggle("active", tab === "register");
}

async function doLogin() {
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-pass").value;
  const err   = document.getElementById("login-error");
  err.textContent = "";

  if (!email || !pass) { err.textContent = "Completa todos los campos"; return; }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = "Entrando...";

  try {
    const r = await fetch("/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password: pass })
    });
    const data = await r.json();
    if (data.ok) {
      window.location.href = data.redirect;
    } else {
      err.textContent = data.error || "Error al iniciar sesión";
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  } catch(e) {
    err.textContent = "Error de conexión";
    btn.disabled = false;
    btn.textContent = "Entrar";
  }
}

async function doRegister() {
  const nombre = document.getElementById("reg-nombre").value.trim();
  const email  = document.getElementById("reg-email").value.trim();
  const pass   = document.getElementById("reg-pass").value;
  const err    = document.getElementById("reg-error");
  err.textContent = "";

  if (!nombre || !email || !pass) { err.textContent = "Completa todos los campos"; return; }
  if (pass.length < 8) { err.textContent = "Mínimo 8 caracteres"; return; }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = "Creando cuenta...";

  try {
    const r = await fetch("/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ nombre, email, password: pass })
    });
    const data = await r.json();
    if (data.ok) {
      window.location.href = data.redirect;
    } else {
      err.textContent = data.error || "Error al registrarse";
      btn.disabled = false;
      btn.textContent = "Crear cuenta";
    }
  } catch(e) {
    err.textContent = "Error de conexión";
    btn.disabled = false;
    btn.textContent = "Crear cuenta";
  }
}

// Enter para enviar
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const loginActive = document.getElementById("panel-login").classList.contains("active");
  if (loginActive) doLogin(); else doRegister();
});
</script>
</body>
