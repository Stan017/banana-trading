<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/static/bananaTradeLogo2.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — Banana</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ══════════════════════════════════════
       PERFIL — Layout principal
    ══════════════════════════════════════ */
    .perfil-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg0);
    }

    /* Header */
    .perfil-wrap .top-header { padding-left: 24px; padding-right: 24px; }
    .perfil-header-left { display: flex; align-items: center; gap: 14px; }
    .perfil-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--blue); margin-bottom: 2px;
    }
    .perfil-header h1 {
      font-size: 18px; font-weight: 700; letter-spacing: -0.4px;
      color: var(--text); margin: 0;
    }
    .perfil-header h1 em { color: var(--green); font-style: normal; }

    /* Sidebar tabs */
    .p-sidebar-tab {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 9px 12px;
      border: none; border-radius: 9px;
      background: transparent; cursor: pointer;
      font-size: 13px; font-weight: 500;
      color: var(--text2); text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .p-sidebar-tab:hover { background: var(--bg3); color: var(--text); }
    .p-sidebar-tab.active {
      background: var(--blue-dim);
      border: 1px solid rgba(37,99,235,0.25);
      color: var(--blue); font-weight: 600;
    }

    /* Secciones del contenido */
    .p-section { display: none; flex-direction: column; gap: 24px; }
    .p-section.active { display: flex; }

    /* Contenido scrollable */
    .perfil-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ══════════════════════════════════════
       TARJETA BASE
    ══════════════════════════════════════ */
    .p-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }
    .p-card-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text3);
      margin-bottom: 20px;
    }

    /* ══════════════════════════════════════
       SECCIÓN: AVATAR + INFO PRINCIPAL
    ══════════════════════════════════════ */
    .p-profile-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .p-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: var(--blue);
      flex-shrink: 0;
      overflow: hidden;
    }
    .p-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .p-info { flex: 1; }
    .p-name {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      color: var(--text); margin-bottom: 4px;
    }
    .p-email { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
    .p-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .p-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }
    .p-badge-pro {
      background: rgba(0,212,170,0.12);
      border: 1px solid rgba(0,212,170,0.25);
      color: var(--green);
    }
    .p-badge-free {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .p-badge-google {
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.2);
      color: var(--blue);
    }
    .p-badge-email {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .p-since { font-size: 11px; color: var(--text3); margin-top: 8px; }

    /* ══════════════════════════════════════
       SECCIÓN: USO DIARIO
    ══════════════════════════════════════ */
    .p-uso-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .p-uso-label { font-size: 13px; color: var(--text2); }
    .p-uso-count { font-size: 13px; font-weight: 600; color: var(--text); }
    .p-uso-count span { color: var(--text3); font-weight: 400; }
    .p-progress-bar {
      height: 6px; background: var(--bg3); border-radius: 10px;
      overflow: hidden;
    }
    .p-progress-fill {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg, var(--blue), #3b82f6);
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .p-progress-fill.full { background: linear-gradient(90deg, var(--red), #fb7185); }
    .p-uso-note {
      font-size: 11px; color: var(--text3);
      margin-top: 8px;
    }
    .p-upgrade-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; width: 100%; padding: 11px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      margin-top: 16px; transition: opacity 0.15s;
      text-decoration: none;
    }
    .p-upgrade-btn:hover { opacity: 0.88; }
    .p-pro-active {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; width: 100%; padding: 11px;
      background: var(--green-dim);
      border: 1px solid rgba(0,212,170,0.25);
      border-radius: 10px; font-size: 13px;
      font-weight: 600; color: var(--green);
      margin-top: 16px;
    }

    /* ══════════════════════════════════════
       SECCIÓN: ESTADÍSTICAS JOURNAL
    ══════════════════════════════════════ */
    .p-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .p-stat-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .p-stat-val {
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.5px; color: var(--text);
      margin-bottom: 4px;
    }
    .p-stat-val.green { color: var(--green); }
    .p-stat-val.red   { color: var(--red); }
    .p-stat-val.blue  { color: var(--blue); }
    .p-stat-label { font-size: 10px; color: var(--text3); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; }

    /* ══════════════════════════════════════
       SECCIÓN: ACTIVIDAD RECIENTE
    ══════════════════════════════════════ */
    .p-activity-list { display: flex; flex-direction: column; gap: 10px; }
    .p-activity-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 10px;
    }
    .p-activity-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
    }
    .p-activity-icon.chat { background: var(--blue-dim); color: var(--blue); }
    .p-activity-icon.trade { background: var(--green-dim); color: var(--green); }
    .p-activity-body { flex: 1; min-width: 0; }
    .p-activity-text {
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .p-activity-time { font-size: 11px; color: var(--text3); }
    .p-activity-empty {
      text-align: center; padding: 32px;
      color: var(--text3); font-size: 13px;
    }

    /* ══════════════════════════════════════
       SECCIÓN: CAMBIAR CONTRASEÑA
    ══════════════════════════════════════ */
    .p-form-group { margin-bottom: 14px; }
    .p-form-label {
      font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: block; margin-bottom: 6px;
    }
    .p-key-wrap { position: relative; display: flex; align-items: center; }
    .p-key-wrap .p-form-input { flex: 1; padding-right: 40px; }
    .p-eye-btn {
      position: absolute; right: 10px;
      background: none; border: none; cursor: pointer;
      color: var(--text3); padding: 4px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s;
    }
    .p-eye-btn:hover { color: var(--text); }
    .p-form-input {
      width: 100%; padding: 10px 12px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      outline: none; transition: border-color 0.15s; box-sizing: border-box;
    }
    .p-form-input:focus { border-color: var(--blue); }
    .p-form-btn {
      padding: 10px 20px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .p-form-btn:hover { opacity: 0.88; }
    .p-form-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .p-form-msg {
      font-size: 12px; margin-top: 8px;
      padding: 8px 10px; border-radius: 6px; display: none;
    }
    .p-form-msg.ok  { background: var(--green-dim); color: var(--green); display: block; }
    .p-form-msg.err { background: var(--red-dim); color: var(--red); display: block; }

    /* ══════════════════════════════════════
       SECCIÓN: CERRAR SESIÓN
    ══════════════════════════════════════ */
    .p-logout-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; width: 100%;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--red);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; text-decoration: none;
    }
    .p-logout-btn:hover { background: var(--red-dim); border-color: rgba(244,63,94,0.25); }

    /* ══════════════════════════════════════
       LOADING STATE
    ══════════════════════════════════════ */
    .p-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text3); font-size: 14px; gap: 10px;
    }
    .p-spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--bg3);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Grid de columnas en desktop */
    .p-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .p-grid-full { grid-column: 1 / -1; }

    @media (max-width: 768px) {
      .p-grid { grid-template-columns: 1fr; }
      .p-stats-grid { grid-template-columns: repeat(2, 1fr); }
      .perfil-content { padding: 20px 16px; }
    }

    /* Último acceso */
    .p-last-access {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text3); margin-top: 6px;
    }

    /* Google no puede cambiar contraseña */
    .p-google-note {
      padding: 12px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 12px; color: var(--text3); text-align: center;
    }

    /* ══════════════════════════════════════
       2FA
    ══════════════════════════════════════ */
    .p-2fa-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .p-2fa-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700;
    }
    .p-2fa-badge.active {
      background: rgba(0,212,170,0.12);
      border: 1px solid rgba(0,212,170,0.25);
      color: var(--green);
    }
    .p-2fa-badge.inactive {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text3);
    }
    .p-2fa-desc {
      font-size: 12px; color: var(--text2);
      line-height: 1.6; margin: 10px 0 16px;
    }
    .p-2fa-setup-wrap {
      display: flex; gap: 28px; align-items: flex-start;
      flex-wrap: wrap; margin-top: 16px;
    }
    .p-2fa-qr {
      width: 160px; height: 160px; border-radius: 10px;
      border: 2px solid var(--border); background: #fff;
      flex-shrink: 0; display: block;
    }
    .p-2fa-steps { flex: 1; min-width: 200px; }
    .p-2fa-step-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
    }
    .p-2fa-secret {
      font-family: var(--mono, monospace);
      font-size: 12px; letter-spacing: 2px; color: var(--text);
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px;
      word-break: break-all; cursor: pointer;
      user-select: all; margin-bottom: 16px;
    }
    .p-2fa-secret:hover { border-color: var(--blue); }
    .p-otp-input {
      width: 148px; padding: 10px 12px; text-align: center;
      font-size: 22px; font-family: var(--mono, monospace);
      letter-spacing: 8px; font-weight: 700;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); outline: none;
      transition: border-color 0.15s; display: block;
      margin-bottom: 12px;
    }
    .p-otp-input:focus { border-color: var(--blue); }
    .p-2fa-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .p-btn-danger {
      padding: 9px 16px; border-radius: 8px;
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.2);
      color: var(--red); font-size: 13px;
      font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .p-btn-danger:hover { background: rgba(220,38,38,0.18); }
    .p-btn-ghost {
      padding: 9px 16px; border-radius: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text2); font-size: 13px;
      font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .p-btn-ghost:hover { background: var(--bg3); color: var(--text); }
    /* Nav group dropdown */
    .nav-group {
      position: relative;
      display: flex;
      align-items: center;
    }
    .nav-group-trigger {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .nav-chevron {
      opacity: 0.5;
      transition: transform 0.2s, opacity 0.2s;
      margin-left: 1px;
    }
    .nav-group:hover .nav-chevron {
      transform: rotate(180deg);
      opacity: 1;
    }
    .nav-submenu {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: var(--bg1, #111);
      border: 1px solid var(--bg3, #2a2a2a);
      border-radius: 8px;
      padding: 10px 4px 4px;
      min-width: 150px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .nav-submenu::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 0;
      right: 0;
      height: 8px;
    }
    .nav-group:hover .nav-submenu {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }
    .nav-sub-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text3, #6b7280);
      text-decoration: none;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .nav-sub-item:hover {
      background: var(--bg2, #1a1a1a);
      color: var(--text, #e5e7eb);
    }
    .nav-sub-item.active {
      color: var(--blue, #3b82f6);
      background: var(--bg2, #1a1a1a);
    }
  </style>
</head>
<body>

  <!-- ══════════════ SIDEBAR ══════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sb-logo">
      <div class="sb-logo-icon" style="background:none;border:none;box-shadow:none;padding:0"><img src="/static/bananaTradeLogo2.png" style="width:36px;height:36px;object-fit:contain"></div>
      <div>
        <div class="sb-logo-name">Banana</div>
        <div class="sb-logo-sub">Crypto Intelligence</div>
      </div>
    </div>

    <!-- TABS DE NAVEGACIÓN INTERNA -->
    <div style="padding:16px 12px 0;display:flex;flex-direction:column;gap:2px" id="perfil-tabs">

      <button class="p-sidebar-tab active" data-tab="seguridad" onclick="switchTab('seguridad')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>

      </button>
      <button class="p-sidebar-tab" data-tab="apis" onclick="switchTab('apis')">

        APIs
      </button>
      <button class="p-sidebar-tab" data-tab="pago" onclick="switchTab('pago')">

        Pago
      </button>

      <div style="height:1px;background:var(--border);margin:10px 4px"></div>

      <button class="p-sidebar-tab" data-tab="learn" onclick="switchTab('learn')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>

      </button>
      <button class="p-sidebar-tab" data-tab="help" onclick="switchTab('help')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Get Help
      </button>
    </div>

    <!-- USER CHIP -->
    <div class="sb-block sb-bottom">
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0">
        <div id="sb-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue);overflow:hidden;flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div id="sb-name" style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
          <div id="sb-plan-chip" style="font-size:10px;color:var(--text3)">Cargando...</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- ══════════════ MAIN ══════════════ -->
  <div class="perfil-wrap">

    <!-- Header -->
        <header class="top-header">
      <div class="header-left"></div>
      <div class="header-center">
        <nav class="header-nav">
          <a href="/" class="header-nav-link">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Home
          </a>
          <a href="/journal" class="header-nav-link">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Journal
          </a>
          <a href="/edge" class="header-nav-link">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Edge Analytics
          </a>
          <div class="nav-group">
            <a href="/liquidity" class="header-nav-link nav-group-trigger">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
              Liquidity
              <svg class="nav-chevron" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </a>

              </span>
              <span id="dd-lang-label">English</span>

              <span class="dd-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
              Mi Perfil
            </a>
            <div class="dd-sep"></div>
            <a href="/logout" class="dd-item dd-logout-item">
              <span class="dd-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
              Cerrar sesión
            </a>
          </div>

    </header>

    <!-- Content -->
    <div class="perfil-content" id="perfil-content">
      <div class="p-loading">
        <div class="p-spinner"></div>
        Cargando perfil...
      </div>

  </div>

  <script>
  // ══════════════════════════════════════
  // Tabs de navegación del perfil
  // ══════════════════════════════════════
  function switchTab(tab) {
    document.querySelectorAll('.p-sidebar-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    document.querySelectorAll('.p-section').forEach(sec => {
      sec.classList.toggle('active', sec.id === 'tab-' + tab);
    });
  }

  // ══════════════════════════════════════
  // Cargar datos del perfil
  // ══════════════════════════════════════
  const PLAN_LIMIT = { free: 10, pro: 999 };

  async function cargarPerfil() {
    try {
      const [meRes, perfilRes] = await Promise.all([
        fetch('/me'),
        fetch('/perfil/datos')
      ]);
      const me     = await meRes.json();
      const datos  = await perfilRes.json();

      if (!me.logueado || !datos.ok) throw new Error('Error cargando datos');

      const u      = me.usuario;
      const stats  = datos.stats;
      const uso    = datos.uso;
      const reciente = datos.actividad_reciente || [];

      // Actualizar sidebar
      actualizarSidebar(u);

      // Renderizar contenido
      renderizar(u, stats, uso, reciente);

      // Inicializar tab activo según sidebar
      const tabActivo = document.querySelector('.p-sidebar-tab.active');
      if (tabActivo) switchTab(tabActivo.dataset.tab);

      // Cargar status Bitunix
      cargarStatusBitunix();
      // Cargar status BYOK
      cargarStatusByok();

    } catch (e) {
      document.getElementById('perfil-content').innerHTML = `
        <div class="p-loading" style="color:var(--red)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Error cargando el perfil. Recargá la página.
        </div>`;
    }
  }

  function actualizarSidebar(u) {
    const sbName = document.getElementById('sb-name');
    const sbPlan = document.getElementById('sb-plan-chip');
    const sbAvatar = document.getElementById('sb-avatar');

    sbName.textContent = u.nombre || u.email;
    sbPlan.textContent = u.plan === 'pro' ? '✦ Plan Pro' : 'Plan Free';
    sbPlan.style.color = u.plan === 'pro' ? 'var(--green)' : 'var(--text3)';

    if (u.avatar_url) {
      sbAvatar.innerHTML = `<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover">`;
    } else {
      sbAvatar.textContent = (u.nombre || u.email || '?')[0].toUpperCase();
    }
  }

  function renderizar(u, stats, uso, reciente) {
    const esPro     = u.plan === 'pro';
    const esGoogle  = !!u.google_id;
    const limite    = esPro ? 999 : 10;
    const usadas    = uso.consultas_hoy || 0;
    const pct       = Math.min((usadas / limite) * 100, 100);
    const fillClass = pct >= 100 ? 'full' : '';

    // Inicial del avatar
    const inicial = (u.nombre || u.email || '?')[0].toUpperCase();
    const avatarHtml = u.avatar_url
      ? `<img src="${u.avatar_url}">`
      : inicial;

    // Badge plan
    const planBadge = esPro
      ? `<span class="p-badge p-badge-pro">✦ Pro</span>`
      : `<span class="p-badge p-badge-free">Free</span>`;

    // Badge método login
    const loginBadge = esGoogle
      ? `<span class="p-badge p-badge-google">
           <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
           Google
         </span>`
      : `<span class="p-badge p-badge-email">
           <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
           Email
         </span>`;

    // Último acceso
    const lastAccess = u.ultimo_acceso
      ? u.ultimo_acceso.replace('T', ' ').slice(0, 16)
      : '—';

    // Estadísticas journal
    const winRate = stats.total_trades > 0
      ? Math.round((stats.wins / stats.total_trades) * 100)
      : null;
    const winRateStr  = winRate !== null ? `${winRate}%` : '—';
    const winRateClass = winRate !== null ? (winRate >= 50 ? 'green' : 'red') : '';
    const rrStr = stats.rr_promedio ? `${stats.rr_promedio.toFixed(2)}` : '—';
    const rrClass = stats.rr_promedio ? (stats.rr_promedio >= 1 ? 'green' : 'red') : '';

    // Actividad reciente
    const actividadHtml = reciente.length === 0
      ? `<div class="p-activity-empty">Sin actividad reciente</div>`
      : reciente.map(a => `
          <div class="p-activity-item">
            <div class="p-activity-icon ${a.tipo}">
              ${a.tipo === 'chat'
                ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`
                : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`
              }
            </div>
            <div class="p-activity-body">
              <div class="p-activity-text">${escHtml(a.texto)}</div>
              <div class="p-activity-time">${a.fecha}</div>
            </div>
          </div>`).join('');

    // Sección contraseña
    const pwSection = esGoogle
      ? `<div class="p-google-note">
           Iniciaste sesión con Google — no podés cambiar la contraseña aquí.
         </div>`
      : `<div class="p-form-group">
           <label class="p-form-label">Contraseña actual</label>
           <input class="p-form-input" type="password" id="pw-actual" placeholder="••••••••">
         </div>
         <div class="p-form-group">
           <label class="p-form-label">Nueva contraseña</label>
           <input class="p-form-input" type="password" id="pw-nueva" placeholder="Mínimo 8 caracteres">
         </div>
         <div class="p-form-group">
           <label class="p-form-label">Confirmar contraseña</label>
           <input class="p-form-input" type="password" id="pw-confirmar" placeholder="Repetí la nueva contraseña">
         </div>
         <button class="p-form-btn" id="btn-cambiar-pw">Cambiar contraseña</button>
         <div class="p-form-msg" id="pw-msg"></div>`;

    // 2FA card
    const totp = !!u.totp_habilitado;
    const twoFaCard = `
      <div class="p-card p-grid-full" id="card-2fa">
        <div class="p-card-title" style="display:flex;align-items:center;justify-content:space-between">
          <span style="display:flex;align-items:center;gap:8px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Autenticación en dos pasos (2FA)
          </span>
          <span class="p-2fa-badge ${totp ? 'active' : 'inactive'}" id="2fa-badge">
            ${totp ? '✓ Activo' : 'Inactivo'}
          </span>
        </div>

        <!-- Estado actual + botón de acción -->
        <div id="2fa-view-status">
          <p class="p-2fa-desc">
            ${totp
              ? 'Tu cuenta está protegida. Cada vez que inicies sesión se pedirá el código de tu autenticador.'
              : 'Añade una capa extra de seguridad. Al activarlo, necesitarás Google Authenticator o Authy para iniciar sesión.'}
          </p>
          <div class="p-2fa-actions">
            ${totp
              ? `<button class="p-btn-danger" id="btn-iniciar-desactivar">Desactivar 2FA</button>`
              : `<button class="p-form-btn" id="btn-iniciar-setup">Activar 2FA</button>`}
          </div>
        </div>

        <!-- Setup: QR + código de confirmación -->
        <div id="2fa-view-setup" style="display:none">
          <div id="2fa-loading" style="font-size:12px;color:var(--text3);padding:12px 0">
            Generando código QR…
          </div>
          <div id="2fa-qr-content" style="display:none">
            <div class="p-2fa-setup-wrap">
              <img id="2fa-qr-img" class="p-2fa-qr" alt="QR 2FA">
              <div class="p-2fa-steps">
                <div class="p-2fa-step-label">Paso 1 — Escanea el QR</div>
                <p style="font-size:12px;color:var(--text2);line-height:1.6;margin:0 0 12px">
                  Abre Google Authenticator o Authy y escanea el código QR.
                </p>
                <div class="p-2fa-step-label">Backup manual</div>
                <div class="p-2fa-secret" id="2fa-secret-text" title="Click para copiar">—</div>
                <div class="p-2fa-step-label">Paso 2 — Ingresa el código</div>
                <input class="p-otp-input" id="2fa-code-input"
                       maxlength="6" inputmode="numeric" placeholder="000000"
                       autocomplete="one-time-code">
                <div class="p-form-msg" id="2fa-msg-setup"></div>
                <div class="p-2fa-actions" style="margin-top:8px">
                  <button class="p-form-btn" id="btn-confirmar-setup">Confirmar y activar</button>
                  <button class="p-btn-ghost" onclick="cancelar2fa()">Cancelar</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Desactivar: confirmación con código -->
        <div id="2fa-view-disable" style="display:none">
          <p class="p-2fa-desc">
            Ingresa el código actual de tu autenticador para confirmar la desactivación.
          </p>
          <input class="p-otp-input" id="2fa-disable-code"
                 maxlength="6" inputmode="numeric" placeholder="000000"
                 autocomplete="one-time-code">
          <div class="p-form-msg" id="2fa-msg-disable"></div>
          <div class="p-2fa-actions" style="margin-top:8px">
            <button class="p-btn-danger" id="btn-confirmar-disable">Confirmar desactivación</button>
            <button class="p-btn-ghost" onclick="cancelar2fa()">Cancelar</button>
          </div>
        </div>

      </div>`;

    // Botón upgrade
    const upgradeHtml = esPro
      ? `<div class="p-pro-active">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
           Plan Pro activo — consultas ilimitadas
         </div>`
      : `<a href="#" class="p-upgrade-btn" id="btn-upgrade">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
           Upgrade a Pro
         </a>`;

    document.getElementById('perfil-content').innerHTML = `

      <!-- ══ TAB: SEGURIDAD ══ -->
      <div class="p-section active" id="tab-seguridad">
        <div class="p-grid">

          <!-- Info principal -->
          <div class="p-card p-grid-full">
            <div class="p-profile-row">
              <div class="p-avatar">${avatarHtml}</div>
              <div class="p-info">
                <div class="p-name">${escHtml(u.nombre || 'Sin nombre')}</div>
                <div class="p-email">${escHtml(u.email)}</div>
                <div class="p-badges">${planBadge}${loginBadge}</div>
                <div class="p-last-access">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  Último acceso: ${lastAccess} &nbsp;·&nbsp;
                  Miembro desde: ${escHtml(u.fecha_registro || '—')}
                </div>
              </div>
            </div>
          </div>

          <!-- Actividad reciente -->
          <div class="p-card">
            <div class="p-card-title">Actividad reciente</div>
            <div class="p-activity-list">${actividadHtml}</div>
          </div>

          <!-- Contraseña -->
          <div class="p-card">
            <div class="p-card-title">Contraseña</div>
            ${pwSection}
            <div style="margin-top:${esGoogle ? '0' : '24px'}">
              <a href="/logout" class="p-logout-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Cerrar sesión
              </a>
            </div>
          </div>

          <!-- 2FA -->
          ${twoFaCard}

        </div>
      </div>

      <!-- ══ TAB: APIs ══ -->
      <div class="p-section" id="tab-apis">
        <div class="p-grid">

          <!-- BYOK — Tu API Key de Anthropic -->
          <div class="p-card p-grid-full" id="byok-section">
            <div class="p-card-title" style="display:flex;align-items:center;justify-content:space-between">
              <span style="display:flex;align-items:center;gap:8px">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                Tu API Key de Anthropic (BYOK)
              </span>
              ${esPro
                ? `<span class="p-badge p-badge-pro">✦ Pro</span>`
                : `<span class="p-badge p-badge-free">Solo Pro</span>`}
            </div>

            ${esPro ? `
              <div id="byok-status-row" style="font-size:12px;color:var(--text3);margin-bottom:14px">Verificando…</div>
              <p style="font-size:12px;color:var(--text2);line-height:1.6;margin:0 0 16px">
                Usa tu propia API key de Anthropic. Tus consultas se cobrarán directamente a tu cuenta —
                sin límite de consultas diarias desde TradeBot. La key se guarda cifrada con AES-256.
              </p>
              <div class="p-form-group">
                <label class="p-form-label">API Key de Anthropic</label>
                <div class="p-key-wrap"><input type="password" id="byok-api-key" class="p-form-input"
                       placeholder="sk-ant-api03-..." autocomplete="off" maxlength="200"><button type="button" class="p-eye-btn" onclick="toggleEye('byok-api-key',this)" title="Mostrar/ocultar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
              </div>
              <div id="byok-msg" class="p-form-msg" style="margin-top:8px"></div>
              <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
                <button class="p-form-btn" onclick="guardarByok()">Guardar key</button>
                <button class="p-form-btn" id="btn-borrar-byok" onclick="borrarByok()"
                        style="background:rgba(220,38,38,0.1);color:var(--red);border:1px solid rgba(220,38,38,0.2);display:none">
                  Eliminar key
                </button>
              </div>
              <p style="margin-top:14px;font-size:11px;color:var(--text3);line-height:1.6">
                Obtén tu key en <strong>console.anthropic.com</strong> → API Keys → Create Key.<br>
                Con BYOK puedes seleccionar cualquier modelo en el chat (incluyendo Sonnet y Opus).
              </p>
            ` : `
              <p style="font-size:13px;color:var(--text2);line-height:1.6;margin:12px 0">
                Con el Plan Pro puedes conectar tu propia API key de Anthropic para consultas ilimitadas
                sin depender del límite diario de TradeBot.
              </p>
              <a href="#" class="p-upgrade-btn" style="max-width:220px" onclick="alert('Stripe próximamente')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                Upgrade a Pro
              </a>
            `}
          </div>

          <!-- API Keys — Exchanges -->
          <div class="p-card p-grid-full" id="bitunix-section">

  async function cambiarPassword() {
    const actual    = document.getElementById('pw-actual').value;
    const nueva     = document.getElementById('pw-nueva').value;
    const confirmar = document.getElementById('pw-confirmar').value;
    const btn       = document.getElementById('btn-cambiar-pw');
    const msg       = document.getElementById('pw-msg');

    msg.className = 'p-form-msg';

    if (!actual || !nueva || !confirmar) {
      msg.textContent = 'Completá todos los campos.';
      msg.className = 'p-form-msg err'; return;
    }
    if (nueva.length < 8) {
      msg.textContent = 'La nueva contraseña debe tener al menos 8 caracteres.';
      msg.className = 'p-form-msg err'; return;
    }
    if (nueva !== confirmar) {
      msg.textContent = 'Las contraseñas no coinciden.';
      msg.className = 'p-form-msg err'; return;
    }

    btn.disabled = true; btn.textContent = 'Cambiando...';

    try {
      const res = await fetch('/perfil/cambiar-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ actual, nueva })
      });
      const data = await res.json();
      if (data.ok) {
        msg.textContent = '✅ Contraseña cambiada correctamente.';
        msg.className = 'p-form-msg ok';
        document.getElementById('pw-actual').value = '';
        document.getElementById('pw-nueva').value = '';
        document.getElementById('pw-confirmar').value = '';
      } else {
        msg.textContent = data.error || 'Error al cambiar la contraseña.';
        msg.className = 'p-form-msg err';
      }
    } catch {
      msg.textContent = 'Error de conexión.';
      msg.className = 'p-form-msg err';
    } finally {
      btn.disabled = false; btn.textContent = 'Cambiar contraseña';
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── BYOK — Anthropic API Key ────────────────────────────
  async function cargarStatusByok() {
    const row    = document.getElementById('byok-status-row');
    const btnDel = document.getElementById('btn-borrar-byok');
    if (!row) return;
    try {
      const r    = await fetch('/perfil/byok/status');

      if (data.byok_configurado) {
        row.innerHTML = `<span style="color:var(--green)">✅ Key configurada</span>
          &nbsp;·&nbsp; Tus consultas usan tu propia API key`;
        if (btnDel) btnDel.style.display = '';
      } else {
        row.innerHTML = `<span style="color:var(--text3)">Sin key — usando API key de TradeBot</span>`;
        if (btnDel) btnDel.style.display = 'none';
      }
    } catch {
      row.innerHTML = `<span style="color:var(--text3)">Error al verificar estado</span>`;
    }
  }

  async function guardarByok() {
    const apiKey = document.getElementById('byok-api-key').value.trim();
    const msg    = document.getElementById('byok-msg');
    msg.className = 'p-form-msg';

    if (!apiKey) {
      msg.textContent = 'Pega tu API key de Anthropic.';
      msg.className = 'p-form-msg err'; return;
    }

    try {
      const res  = await fetch('/perfil/byok', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ api_key: apiKey })
      });
      const data = await res.json();
      if (data.ok) {
        msg.textContent = '✅ ' + (data.mensaje || 'Key guardada.');
        msg.className = 'p-form-msg ok';
        document.getElementById('byok-api-key').value = '';
        cargarStatusByok();
      } else {
        msg.textContent = data.error || 'Error al guardar.';
        msg.className = 'p-form-msg err';
      }
    } catch {
      msg.textContent = 'Error de conexión.';
      msg.className = 'p-form-msg err';
    }
  }

  async function borrarByok() {
    if (!confirm('¿Eliminar tu API key? Las consultas volverán a usar la key de TradeBot.')) return;
    const msg = document.getElementById('byok-msg');
    try {
      const res  = await fetch('/perfil/byok', { method: 'DELETE' });
      const data = await res.json();
      if (data.ok) {
        msg.textContent = 'Key eliminada.';
        msg.className = 'p-form-msg ok';
        cargarStatusByok();
      }
    } catch {
      msg.textContent = 'Error al eliminar.';
      msg.className = 'p-form-msg err';
    }
  }

  // ─── Bitunix API Keys ───────────────────────────────────
  async function cargarStatusBitunix() {
    const row    = document.getElementById("bitunix-status-row");
    const btnDel = document.getElementById("btn-borrar-bitunix");
    if (!row) return;
    try {
      const r    = await fetch("/api/bitunix/status");
      const data = await r.json();
      if (data.configurado && data.ok) {
        const b = data.balance || {};
        row.innerHTML = `<span style="color:var(--green)">✅ Conectado</span>
          &nbsp;·&nbsp; Balance: <strong>$${Number(b.margin_balance || 0).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2})} USDT</strong>
          &nbsp;·&nbsp; Disponible: <strong>$${Number(b.available || 0).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2})} USDT</strong>`;
        if (btnDel) btnDel.style.display = "";
      } else if (data.configurado && !data.ok) {
        row.innerHTML = `<span style="color:var(--red)">⚠️ Claves inválidas o sin permisos</span>`;
        if (btnDel) btnDel.style.display = "";
      } else {
        row.innerHTML = `<span style="color:var(--text3)">Sin conectar — ingresa tus API keys</span>`;
        if (btnDel) btnDel.style.display = "none";
      }
    } catch {
      row.innerHTML = `<span style="color:var(--text3)">Error al verificar estado</span>`;
    }
  }

  function toggleEye(inputId, btn) {
    const inp = document.getElementById(inputId);
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }

  async function guardarKeysBitunix() {
    const apiKey    = document.getElementById("bitunix-api-key").value.trim();
    const secretKey = document.getElementById("bitunix-secret-key").value.trim();
    const btn       = document.getElementById("btn-guardar-bitunix");
    const msg       = document.getElementById("bitunix-msg");

    msg.className = "p-form-msg";
    if (!apiKey || !secretKey) {
      msg.textContent = "Ambas claves son requeridas.";
      msg.className = "p-form-msg err"; return;
    }

    btn.disabled = true; btn.textContent = "Validando…";
    try {
      const res  = await fetch("/api/bitunix/keys", {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ api_key: apiKey, secret_key: secretKey })
      });
      const data = await res.json();
      if (data.ok) {
        msg.textContent = "✅ " + (data.mensaje || "Claves guardadas correctamente.");
        msg.className = "p-form-msg ok";
        document.getElementById("bitunix-api-key").value = "";
        document.getElementById("bitunix-secret-key").value = "";
        cargarStatusBitunix();
      } else {
        msg.textContent = data.error || "Error al guardar.";
        msg.className = "p-form-msg err";
      }
    } catch {
      msg.textContent = "Error de conexión.";
      msg.className = "p-form-msg err";
    } finally {
      btn.disabled = false; btn.textContent = "Guardar y validar";
    }
  }

  async function borrarKeysBitunix() {
    if (!confirm("¿Desconectar Bitunix? Se eliminarán tus API keys guardadas.")) return;
    const msg = document.getElementById("bitunix-msg");
    try {
      const res  = await fetch("/api/bitunix/keys", { method: "DELETE" });
      const data = await res.json();
      if (data.ok) {
        msg.textContent = "Claves eliminadas.";
        msg.className = "p-form-msg ok";
        cargarStatusBitunix();
      }
    } catch {
      msg.textContent = "Error al eliminar.";
      msg.className = "p-form-msg err";
    }
  }

  // ══════════════════════════════════════
  // 2FA — funciones de estado
  // ══════════════════════════════════════

  function _2fa_show(view) {
    ['status','setup','disable'].forEach(v => {
      document.getElementById(`2fa-view-${v}`).style.display = v === view ? '' : 'none';
    });
  }

  function cancelar2fa() {
    _2fa_show('status');
    ['2fa-msg-setup','2fa-msg-disable'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.className = 'p-form-msg'; el.textContent = ''; }
    });
    const ci = document.getElementById('2fa-code-input');
    const di = document.getElementById('2fa-disable-code');
    if (ci) ci.value = '';
    if (di) di.value = '';
  }

  async function iniciarSetup2fa() {
    _2fa_show('setup');
    document.getElementById('2fa-loading').style.display = '';
    document.getElementById('2fa-qr-content').style.display = 'none';

    try {
      const res  = await fetch('/perfil/2fa/setup');
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Error generando QR');

      document.getElementById('2fa-qr-img').src = data.qr;
      document.getElementById('2fa-secret-text').textContent = data.secret;
      document.getElementById('2fa-loading').style.display = 'none';
      document.getElementById('2fa-qr-content').style.display = '';
      document.getElementById('2fa-code-input').focus();
    } catch(e) {
      document.getElementById('2fa-loading').textContent = 'Error generando QR. Intenta de nuevo.';
      document.getElementById('2fa-loading').style.color = 'var(--red)';
    }
  }

  async function confirmarActivar2fa() {
    const code = (document.getElementById('2fa-code-input').value || '').replace(/\s/g,'');
    const btn  = document.getElementById('btn-confirmar-setup');
    const msg  = document.getElementById('2fa-msg-setup');
    msg.className = 'p-form-msg';

    if (!code || code.length !== 6 || !/^\d+$/.test(code)) {
      msg.textContent = 'Ingresa los 6 dígitos del autenticador.';
      msg.className = 'p-form-msg err'; return;
    }

    btn.disabled = true; btn.textContent = 'Verificando…';
    try {
      const res  = await fetch('/perfil/2fa/enable', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      const data = await res.json();
      if (data.ok) {
        // Actualizar badge y volver a la vista de estado
        document.getElementById('2fa-badge').textContent = '✓ Activo';
        document.getElementById('2fa-badge').className   = 'p-2fa-badge active';
        _2fa_show('status');
        document.getElementById('2fa-view-status').innerHTML = `
          <p class="p-2fa-desc">Tu cuenta está protegida. Cada vez que inicies sesión se pedirá el código de tu autenticador.</p>
          <div class="p-2fa-actions">
            <button class="p-btn-danger" id="btn-iniciar-desactivar">Desactivar 2FA</button>
          </div>`;
        document.getElementById('btn-iniciar-desactivar')
          ?.addEventListener('click', iniciarDesactivar2fa);
      } else {
        msg.textContent = data.error || 'Código incorrecto.';
        msg.className   = 'p-form-msg err';
        document.getElementById('2fa-code-input').value = '';
        document.getElementById('2fa-code-input').focus();
      }
    } catch {
      msg.textContent = 'Error de conexión.';
      msg.className   = 'p-form-msg err';
    } finally {
      btn.disabled = false; btn.textContent = 'Confirmar y activar';
    }
  }

  function iniciarDesactivar2fa() {
    _2fa_show('disable');
    document.getElementById('2fa-disable-code').focus();
  }

  async function confirmarDesactivar2fa() {
    const code = (document.getElementById('2fa-disable-code').value || '').replace(/\s/g,'');
    const btn  = document.getElementById('btn-confirmar-disable');
    const msg  = document.getElementById('2fa-msg-disable');
    msg.className = 'p-form-msg';

    if (!code || code.length !== 6 || !/^\d+$/.test(code)) {
      msg.textContent = 'Ingresa los 6 dígitos del autenticador.';
      msg.className = 'p-form-msg err'; return;
    }

    btn.disabled = true; btn.textContent = 'Desactivando…';
    try {
      const res  = await fetch('/perfil/2fa/disable', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      const data = await res.json();
      if (data.ok) {
        document.getElementById('2fa-badge').textContent = 'Inactivo';
        document.getElementById('2fa-badge').className   = 'p-2fa-badge inactive';
        _2fa_show('status');
        document.getElementById('2fa-view-status').innerHTML = `
          <p class="p-2fa-desc">Añade una capa extra de seguridad. Al activarlo, necesitarás Google Authenticator o Authy para iniciar sesión.</p>
          <div class="p-2fa-actions">
            <button class="p-form-btn" id="btn-iniciar-setup">Activar 2FA</button>
          </div>`;
        document.getElementById('btn-iniciar-setup')
          ?.addEventListener('click', iniciarSetup2fa);
      } else {
        msg.textContent = data.error || 'Código incorrecto.';
        msg.className   = 'p-form-msg err';
        document.getElementById('2fa-disable-code').value = '';
        document.getElementById('2fa-disable-code').focus();
      }
    } catch {
      msg.textContent = 'Error de conexión.';
      msg.className   = 'p-form-msg err';
    } finally {
      btn.disabled = false; btn.textContent = 'Confirmar desactivación';
    }
  }

  // Arrancar
  cargarPerfil();
  </script>
<script src="/static/ui.js"></script>
